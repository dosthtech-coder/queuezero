<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', (e) => {
        document.body.innerHTML += `<div style="background:red;color:white;padding:20px;z-index:99999;position:fixed;top:0;left:0;width:100%;height:100vh;overflow:auto;"><h1 style="font-size:24px;">Error: ${e.message}</h1><pre style="font-size:12px;white-space:pre-wrap;">${e.error?.stack}</pre></div>`;
      });
      window.addEventListener('unhandledrejection', (e) => {
        document.body.innerHTML += `<div style="background:orange;color:white;padding:20px;z-index:99999;position:fixed;top:0;left:0;width:100%;height:100vh;overflow:auto;"><h1 style="font-size:24px;">Promise Error: ${e.reason?.message || e.reason}</h1><pre style="font-size:12px;white-space:pre-wrap;">${e.reason?.stack}</pre></div>`;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
